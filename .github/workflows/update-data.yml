name: Update dashboard data

on:
  schedule:
    # 03:00 UTC = 11:00 PM ET during EDT (summer). If EDT ends (clocks fall
    # back to EST in November), this will run at 10:00 PM ET instead --
    # change to '0 4 * * *' at that point if you want to hold exactly at 11 PM.
    - cron: '0 0 * * *'
  workflow_dispatch: {}  # lets you also trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate data.json
        run: python generate_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Daily data update"
          git push
